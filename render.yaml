services:
  - type: web
    name: dental-web-agent
    runtime: docker
    plan: free           # Change to 'starter' for always-on (no sleep)
    dockerfilePath: ./Dockerfile
    # Explicit health-check path — Render probes this to confirm the app is up
    healthCheckPath: /health
    envVars:
      # Set OPENROUTER_API_KEY in the Render dashboard — never commit secrets
      - key: OPENROUTER_API_KEY
        sync: false
      # OpenRouter model ID — passed to AIAgent(model=...) in hermes_agent_wrapper.py
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      # Hermes Agent Framework — OpenAI-compatible base URL (OpenRouter)
      - key: HERMES_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: STT_MODEL
        value: base
      - key: TTS_LANGUAGE
        value: en
      - key: DATABASE_URL
        value: sqlite:////tmp/dental.db
      # Render injects PORT automatically; declare it so the value is visible in logs
      - key: PORT
        value: 10000
